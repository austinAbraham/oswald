name: oswald_example
version: "1.0.0"
config-version: 2

# This profile name is matched in the co-located profiles.yml.
profile: oswald_example

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  oswald_example:
    staging:
      +materialized: view
    marts:
      +materialized: table

seeds:
  oswald_example:
    +quote_columns: false
